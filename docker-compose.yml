version: '3.8'

services:
  # --- INFRASTRUCTURE LAYER ---

  # Message broker (pub/sub backbone)
  redis:
    image: redis:7-alpine
    container_name: p31_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - p31_net

  # Persistence (local-first, sovereign data)
  db:
    image: postgres:15-alpine
    container_name: p31_db
    restart: always
    environment:
      POSTGRES_USER: operator
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: p31_core
    volumes:
      - ./data/db:/var/lib/postgresql/data
    networks:
      - p31_net

  # --- LOGIC LAYER ---

  # P31 Buffer (communication processing)
  shelter:
    build:
      context: ./apps/shelter
    container_name: p31_shelter
    restart: unless-stopped
    depends_on:
      - redis
      - db
    environment:
      - REDIS_HOST=p31_redis
      - DB_HOST=p31_db
    ports:
      - "3000:3000"
    networks:
      - p31_net

  # P31 Tandem (backend services)
  centaur:
    build:
      context: ./SUPER-CENTAUR
    container_name: p31_tandem
    restart: unless-stopped
    depends_on:
      - redis
      - db
    environment:
      - REDIS_HOST=p31_redis
      - DB_HOST=p31_db
    ports:
      - "4000:4000"
    networks:
      - p31_net

networks:
  p31_net:
    driver: bridge
