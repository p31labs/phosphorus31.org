groups:
  - name: phenix_citadel_alerts
    rules:
      # System Health Alerts
      - alert: CitadelDown
        expr: up{job=~"cortex_api|worker"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Phenix Citadel service is down"
          description: "{{ $labels.job }} has been down for more than 30 seconds"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }}s"

      # Redis Stream Health
      - alert: RedisStreamBacklog
        expr: redis_stream_pending_entries > 1000
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Redis stream backlog is growing"
          description: "Stream {{ $labels.stream }} has {{ $value }} pending entries"

      - alert: RedisMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage is high"
          description: "Redis memory usage is {{ $value | humanizePercentage }}"

      # Database Health
      - alert: DatabaseConnectionsHigh
        expr: pg_stat_database_numbackends > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Database connections are high"
          description: "Database {{ $labels.datname }} has {{ $value }} connections"

      - alert: DatabaseSlowQueries
        expr: rate(pg_stat_statements_mean_time_ms[5m]) > 1000
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries detected"
          description: "Average query time is {{ $value }}ms"

      # Kill Chain Alerts
      - alert: DeadManSwitchTriggered
        expr: time() - redis_last_access_time{key="system:heartbeat:admin"} > 120
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Dead Man's Switch has been triggered"
          description: "No admin heartbeat for more than 2 minutes"

      - alert: HighEntropyDetected
        expr: system_entropy_score > 0.85
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "High system entropy detected"
          description: "System entropy score is {{ $value }}, possible breach detected"

      # Quantum Vault Alerts
      - alert: KeyRotationNeeded
        expr: time() - quantum_vault_key_generation_time > 2592000  # 30 days
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Quantum vault key rotation needed"
          description: "Quantum vault keys are older than 30 days"

      - alert: SignatureVerificationFailed
        expr: quantum_vault_signature_failures_total > 0
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: "Quantum vault signature verification failed"
          description: "Signature verification failed {{ $value }} times"

      # Network Security
      - alert: SuspiciousTraffic
        expr: rate(http_requests_total{status=~"4..|5.."}[5m]) > 100
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Suspicious network traffic detected"
          description: "High rate of error responses: {{ $value }} req/sec"

      - alert: GatewayDown
        expr: up{job="caddy"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Citadel gateway is down"
          description: "Caddy gateway has been down for more than 30 seconds"

      # Resource Usage
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) * 100 > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Disk space is critically low"
          description: "Disk usage is {{ $value }}% on {{ $labels.instance }}"