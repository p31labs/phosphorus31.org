version: '3.8'

services:
  # --- MONITORING & LOGGING LAYER ---
  
  # 1. LOG AGGREGATION (Elasticsearch)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: phenix_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - ./phenix_data/elasticsearch:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - centaur_net

  # 2. LOG VISUALIZATION (Kibana)
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: phenix_kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - centaur_net

  # 3. LOG SHIPPER (Filebeat)
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.0
    container_name: phenix_filebeat
    restart: unless-stopped
    user: root
    depends_on:
      - elasticsearch
    volumes:
      - ./logs:/var/log/phenix:ro
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
    networks:
      - centaur_net

  # 4. METRICS MONITORING (Prometheus)
  prometheus:
    image: prom/prometheus:latest
    container_name: phenix_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./phenix_data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - centaur_net

  # 5. METRICS VISUALIZATION (Grafana)
  grafana:
    image: grafana/grafana:latest
    container_name: phenix_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./phenix_data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - centaur_net

networks:
  centaur_net:
    external: true