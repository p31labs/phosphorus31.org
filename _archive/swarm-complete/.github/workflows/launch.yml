# P31 Labs — Dual-Domain CI/CD Pipeline
# phosphorus31.org (static) + p31ca.org (Vite app)
#
# Triggers on push to main. Two independent deploy jobs.
# Both require CLOUDFLARE_API_TOKEN secret.

name: 🚀 P31 Launch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ═══════════════════════════════════════
  # Gate: Lint, typecheck, basic validation
  # ═══════════════════════════════════════
  ci-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Verify website/index.html exists
        run: test -f website/index.html

      - name: Verify CNAME files
        run: |
          echo "=== website CNAME ==="
          cat website/CNAME
          echo "=== ui CNAME ==="
          cat ui/public/CNAME

      - name: Verify no MATA references
        run: |
          count=$(grep -rl "MATA" website/ ui/public/ docs/ 2>/dev/null | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "FAIL: Found MATA references:"
            grep -rl "MATA" website/ ui/public/ docs/
            exit 1
          fi
          echo "Clean: 0 MATA references ✓"

  # ═══════════════════════════════════════
  # Deploy: phosphorus31.org (static site)
  # ═══════════════════════════════════════
  launch-website:
    needs: ci-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Deploy phosphorus31.org
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # FIXED: was apps/web/, now website/ (the actual source of truth)
          command: pages deploy website/ --project-name=phosphorus31-org

  # ═══════════════════════════════════════
  # Deploy: p31ca.org (Vite app)
  # ═══════════════════════════════════════
  launch-app:
    needs: ci-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ui
        run: npm install

      - name: Build Vite app
        working-directory: ui
        run: npm run build

      - name: Verify build
        run: |
          echo "=== Checking dist contents ==="
          test -f ui/dist/index.html || (echo "FAIL: no index.html" && exit 1)
          grep -q "p31ca.org" ui/dist/CNAME || (echo "FAIL: CNAME missing or wrong" && exit 1)
          test -f ui/dist/apps/content-forge.html || (echo "WARN: content-forge.html missing")
          echo "Build verification passed ✓"

      - name: Deploy p31ca.org
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy ui/dist/ --project-name=p31ca-org
