# P31 Geodesic Platform — Colyseus + API + Postgres + Redis
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: p31
      POSTGRES_USER: p31
      POSTGRES_PASSWORD: ${DB_PASSWORD:-p31dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p31"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server ${REDIS_PASSWORD:+--requirepass $$REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  platform:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      COLYSEUS_PORT: 2567
      API_PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: p31
      DB_USER: p31
      DB_PASSWORD: ${DB_PASSWORD:-p31dev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-change-me}
    ports:
      - "2567:2567"
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
