<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L.O.V.E. Economy — P31 Labs · Phosphorus-31</title>
  <meta name="description" content="L.O.V.E. — Ledger of Ontological Volume and Entropy. P31 Labs' soulbound economy for neurodivergent assistive technology. Donate crypto, explore the founding nodes.">
  <meta property="og:title" content="L.O.V.E. Economy — P31 Labs">
  <meta property="og:description" content="Soulbound economy. Proof of Care. Donate to assistive technology for neurodivergent minds.">
  <meta property="og:url" content="https://phosphorus31.org/wallet/">
  <meta name="theme-color" content="#050510">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@200;300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #050510;
      color: #e8e8f0;
      line-height: 1.6;
      overflow-x: hidden;
    }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #050510; }
    ::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2ecc71; }
    input:focus { outline: 1px solid #2ecc71; }
    button:focus-visible { outline: 2px solid #e879f9; outline-offset: 2px; }
    ::selection { background: rgba(232,121,249,0.3); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 10px rgba(232,121,249,0.2); } 50% { box-shadow: 0 0 25px rgba(232,121,249,0.4); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useReducer, useRef, useCallback } = React;

    // ═══════════════════════════════════════════════════════════════
    // P31 UNIFIED WALLET — L.O.V.E. ECONOMY
    // Ledger of Ontological Volume and Entropy
    // Live at phosphorus31.org/wallet
    // ═══════════════════════════════════════════════════════════════

    const WALLET_ADDRESS = "0x90048cbb3CDCef200a54D6D336EbB4e0ce18d82c";

    // ─── DESIGN TOKENS ───
    const C = {
      bg: "#050510", bg2: "#0a0a18", card: "#0c0c1c", cardHover: "#101028",
      green: "#2ecc71", greenDim: "#1b7a5a", greenDeep: "#0d3b2e",
      greenGlow: "rgba(46,204,113,0.12)",
      love: "#e879f9", loveDim: "#a855f7", loveGlow: "rgba(232,121,249,0.12)",
      loveDeep: "#3b1560",
      calcium: "#60a5fa",
      gold: "#fbbf24",
      red: "#ef4444", orange: "#f59e0b",
      text: "#e8e8f0", dim: "#6b7280", muted: "#3a3a52",
      border: "#1a1a2e", borderGlow: "#1b7a5a",
      mono: "'JetBrains Mono', monospace",
      sans: "'Outfit', sans-serif",
    };

    // ─── TRANSACTION TYPES ───
    const TX = {
      BLOCK_PLACED:     { id: "BLOCK_PLACED",     love: 1.0,  icon: "🧱", label: "Block Placed",      color: C.green },
      COHERENCE_GIFT:   { id: "COHERENCE_GIFT",   love: 5.0,  icon: "🔮", label: "Coherence Gift",    color: C.love },
      ARTIFACT_CREATED: { id: "ARTIFACT_CREATED", love: 10.0, icon: "⚡", label: "Artifact Created",  color: C.gold },
      CARE_RECEIVED:    { id: "CARE_RECEIVED",    love: 3.0,  icon: "💜", label: "Care Received",     color: C.love },
      CARE_GIVEN:       { id: "CARE_GIVEN",       love: 2.0,  icon: "🤲", label: "Care Given",        color: C.loveDim },
      TETRAHEDRON_BOND: { id: "TETRAHEDRON_BOND", love: 15.0, icon: "🔺", label: "Tetrahedron Bond",  color: C.gold },
      VOLTAGE_CALMED:   { id: "VOLTAGE_CALMED",   love: 2.0,  icon: "🛡️", label: "Voltage Calmed",   color: C.green },
      MILESTONE_REACHED:{ id: "MILESTONE_REACHED",love: 25.0, icon: "🏆", label: "Milestone Reached", color: C.gold },
      DONATION:         { id: "DONATION",         love: 0,    icon: "💎", label: "Crypto Donation",   color: C.calcium },
      PING:             { id: "PING",             love: 1.0,  icon: "📡", label: "Ping Verified",     color: C.green },
    };

    // ─── NETWORKS ───
    const NETWORKS = [
      { id: "base",     name: "Base L2",   icon: "🔵", color: "#0052FF" },
      { id: "ethereum", name: "Ethereum",  icon: "⟠",  color: "#627EEA" },
      { id: "polygon",  name: "Polygon",   icon: "🟣", color: "#8247E5" },
      { id: "arbitrum", name: "Arbitrum",  icon: "🔷", color: "#28A0F0" },
      { id: "optimism", name: "Optimism",  icon: "🔴", color: "#FF0420" },
    ];

    // ─── FOUNDING NODES (anonymized for public — no names, no initials) ───
    const FOUNDING_NODES = [
      {
        id: "node1", name: "Node #1", initials: "F.N.1",
        born: "2016-03-10", age: 10, role: "Founding Node",
        phase: "TRUST", phaseLabel: "Trust Phase",
        nextMilestone: "Apprenticeship", nextAge: 13, nextDate: "2029-03-10",
        emoji: "🎮", color: C.green,
      },
      {
        id: "node2", name: "Node #2", initials: "F.N.2",
        born: "2019-08-08", age: 6, role: "Founding Node",
        phase: "TRUST", phaseLabel: "Trust Phase",
        nextMilestone: "Apprenticeship", nextAge: 13, nextDate: "2032-08-08",
        emoji: "🌿", color: C.love,
      },
    ];

    const PHASES = [
      { id: "TRUST",          label: "Trust",          ages: "0–12",  pct: 0 },
      { id: "APPRENTICESHIP", label: "Apprenticeship", ages: "13–17", pct: 33 },
      { id: "SOVEREIGNTY",    label: "Sovereignty",    ages: "18+",   pct: 100 },
    ];

    const TABS = [
      { id: "nodes",  icon: "🔺", label: "Founding Nodes" },
      { id: "love",   icon: "💜", label: "L.O.V.E." },
      { id: "wallet", icon: "💎", label: "Wallet" },
      { id: "donate", icon: "🤝", label: "Donate" },
    ];

    // ─── HELPERS ───
    const uid = () => Math.random().toString(36).slice(2, 8);
    const ts = () => new Date().toISOString();
    const fmt = (d) => new Date(d).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

    // ─── REDUCER ───
    const initial = {
      transactions: [],
      loveBalance: 0,
      careGiven: 0, careReceived: 0, tetraBonds: 0,
      sovereigntyPool: 0, performancePool: 0,
      mode: "offline",
      connectedWallet: null,
      network: "base",
      cryptoBalances: { base: 0, ethereum: 0, polygon: 0, arbitrum: 0, optimism: 0 },
      donations: [],
      syncQueue: [],
      lastSync: null,
      exchangeRate: 0.001,
    };

    function reducer(s, a) {
      switch (a.type) {
        case "ADD_TX": {
          const txDef = TX[a.txType] || TX.BLOCK_PLACED;
          const love = a.amount || txDef.love;
          const tx = {
            id: uid(), type: a.txType, love, from: a.from || "system",
            to: a.to || "operator", meta: a.meta || {}, time: ts(),
            settled: s.mode === "online", source: s.mode === "online" ? "chain" : "local",
          };
          const sovAdd = love * 0.5;
          const perfAdd = love * 0.5;
          return {
            ...s,
            loveBalance: s.loveBalance + love,
            sovereigntyPool: s.sovereigntyPool + sovAdd,
            performancePool: s.performancePool + perfAdd,
            transactions: [tx, ...s.transactions].slice(0, 200),
            careGiven: a.txType === "CARE_GIVEN" ? s.careGiven + 1 : s.careGiven,
            careReceived: a.txType === "CARE_RECEIVED" ? s.careReceived + 1 : s.careReceived,
            tetraBonds: a.txType === "TETRAHEDRON_BOND" ? s.tetraBonds + 1 : s.tetraBonds,
            syncQueue: s.mode === "offline" ? [...s.syncQueue, tx] : s.syncQueue,
          };
        }
        case "ADD_DONATION": {
          const donation = {
            id: uid(), type: "DONATION", amount: a.amount, currency: a.currency,
            network: a.network, from: a.from || "anonymous", time: ts(),
            txHash: a.txHash || null,
          };
          return {
            ...s,
            donations: [donation, ...s.donations].slice(0, 100),
            cryptoBalances: { ...s.cryptoBalances, [a.network]: (s.cryptoBalances[a.network] || 0) + a.amount },
          };
        }
        case "SET_MODE": return { ...s, mode: a.mode };
        case "CONNECT_WALLET": return { ...s, connectedWallet: a.address, mode: "online" };
        case "DISCONNECT_WALLET": return { ...s, connectedWallet: null, mode: "offline" };
        case "SET_NETWORK": return { ...s, network: a.network };
        case "SYNC_COMPLETE": return { ...s, syncQueue: [], lastSync: ts() };
        default: return s;
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // SHARED UI COMPONENTS
    // ═══════════════════════════════════════════════════════════════

    const GlowBar = ({ value, max, color = C.green, h = 6 }) => (
      <div style={{ width: "100%", height: h, background: `${color}15`, borderRadius: h / 2, overflow: "hidden" }}>
        <div style={{
          width: `${Math.min(100, (value / Math.max(max, 1)) * 100)}%`, height: "100%",
          background: color, borderRadius: h / 2, transition: "width 0.6s ease",
          boxShadow: `0 0 8px ${color}40`,
        }} />
      </div>
    );

    const Badge = ({ children, color = C.green }) => (
      <span style={{
        display: "inline-block", padding: "2px 8px", fontSize: 10, fontFamily: C.mono,
        background: `${color}18`, color, border: `1px solid ${color}30`, borderRadius: 3,
        letterSpacing: "0.05em",
      }}>{children}</span>
    );

    const Card = ({ children, glow, color = C.borderGlow, style = {} }) => (
      <div style={{
        background: C.card, border: `1px solid ${glow ? color : C.border}`,
        borderRadius: 10, padding: 16, transition: "all 0.3s",
        boxShadow: glow ? `0 0 20px ${color}20` : "none", ...style,
      }}>{children}</div>
    );

    const Btn = ({ children, onClick, variant = "default", small, disabled, style = {} }) => {
      const variants = {
        default: { background: "transparent", borderColor: C.border, color: C.dim },
        primary: { background: C.greenDeep, borderColor: C.greenDim, color: C.green },
        love:    { background: C.loveDeep, borderColor: `${C.love}50`, color: C.love },
        danger:  { background: "transparent", borderColor: `${C.red}60`, color: C.red },
        gold:    { background: `${C.gold}15`, borderColor: `${C.gold}40`, color: C.gold },
        calcium: { background: `${C.calcium}12`, borderColor: `${C.calcium}40`, color: C.calcium },
      };
      const v = variants[variant] || variants.default;
      return (
        <button onClick={disabled ? undefined : onClick} style={{
          padding: small ? "5px 12px" : "9px 18px", fontSize: small ? 11 : 12,
          fontFamily: C.mono, border: "1px solid", borderRadius: 5,
          cursor: disabled ? "not-allowed" : "pointer", transition: "all 0.2s",
          opacity: disabled ? 0.4 : 1, letterSpacing: "0.04em", ...v, ...style,
        }}>{children}</button>
      );
    };

    // ═══════════════════════════════════════════════════════════════
    // FOUNDING NODE CARD
    // ═══════════════════════════════════════════════════════════════

    function FoundingNodeCard({ node, sovereigntyShare }) {
      const progressToNext = (node.age / node.nextAge) * 100;
      const yearsLeft = node.nextAge - node.age;

      return (
        <Card glow color={node.color}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{
                width: 44, height: 44, borderRadius: "50%",
                background: `${node.color}20`, border: `2px solid ${node.color}50`,
                display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22,
              }}>{node.emoji}</div>
              <div>
                <div style={{ fontSize: 16, fontWeight: 700 }}>{node.name}</div>
                <div style={{ fontSize: 10, fontFamily: C.mono, color: C.dim }}>
                  {node.initials} · {node.role}
                </div>
              </div>
            </div>
            <Badge color={node.color}>{node.phaseLabel}</Badge>
          </div>

          <div style={{ marginTop: 14, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div>
              <div style={{ fontSize: 9, fontFamily: C.mono, color: C.dim, letterSpacing: "0.1em" }}>SOVEREIGNTY SHARE</div>
              <div style={{ fontSize: 22, fontWeight: 700, color: C.love, fontFamily: C.mono }}>
                {sovereigntyShare.toFixed(1)} <span style={{ fontSize: 11, color: C.dim }}>LOVE</span>
              </div>
            </div>
            <div>
              <div style={{ fontSize: 9, fontFamily: C.mono, color: C.dim, letterSpacing: "0.1em" }}>AGE</div>
              <div style={{ fontSize: 22, fontWeight: 700, fontFamily: C.mono }}>{node.age}</div>
            </div>
          </div>

          <div style={{ marginTop: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, marginBottom: 4 }}>
              <span style={{ color: C.dim }}>→ {node.nextMilestone} in {yearsLeft}y</span>
              <span style={{ color: node.color, fontFamily: C.mono }}>{progressToNext.toFixed(0)}%</span>
            </div>
            <GlowBar value={node.age} max={node.nextAge} color={node.color} h={5} />
          </div>

          <div style={{ display: "flex", gap: 4, marginTop: 10 }}>
            {PHASES.map(p => (
              <div key={p.id} style={{
                flex: 1, padding: "4px 0", textAlign: "center", fontSize: 8, fontFamily: C.mono,
                background: p.id === node.phase ? `${node.color}20` : C.bg,
                border: `1px solid ${p.id === node.phase ? node.color : C.border}30`,
                borderRadius: 3, color: p.id === node.phase ? node.color : C.muted,
                letterSpacing: "0.08em",
              }}>
                {p.label}<br /><span style={{ fontSize: 7 }}>{p.ages}</span>
              </div>
            ))}
          </div>
        </Card>
      );
    }

    // ═══════════════════════════════════════════════════════════════
    // DONATION WIDGET — REAL WALLET ADDRESS
    // ═══════════════════════════════════════════════════════════════

    function DonationWidget({ state, dispatch }) {
      const [amount, setAmount] = useState("");
      const [currency, setCurrency] = useState("ETH");
      const [showAddress, setShowAddress] = useState(false);
      const [copied, setCopied] = useState(false);

      const copyAddress = () => {
        if (navigator.clipboard) {
          navigator.clipboard.writeText(WALLET_ADDRESS).then(() => {
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          });
        }
      };

      const simulateDonation = () => {
        const val = parseFloat(amount);
        if (!val || isNaN(val) || val <= 0) return;
        dispatch({
          type: "ADD_DONATION", amount: val, currency,
          network: state.network, from: state.connectedWallet || "anonymous",
        });
        dispatch({ type: "ADD_TX", txType: "ARTIFACT_CREATED", from: "donor", meta: { currency, amount: val } });
        setAmount("");
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 12, animation: "fadeIn 0.4s ease" }}>
          {/* Hero donate card */}
          <Card glow color={C.calcium} style={{ position: "relative", overflow: "hidden" }}>
            <div style={{
              position: "absolute", top: -40, right: -40, width: 120, height: 120, borderRadius: "50%",
              background: `radial-gradient(circle, ${C.calcium}15 0%, transparent 70%)`,
            }} />
            <div style={{ fontSize: 10, fontFamily: C.mono, color: C.calcium, letterSpacing: "0.12em", marginBottom: 6 }}>
              DONATE TO P31 LABS
            </div>
            <div style={{ fontSize: 20, fontWeight: 300, marginBottom: 8 }}>
              Fund assistive technology for neurodivergent minds
            </div>
            <p style={{ fontSize: 12, color: C.dim, lineHeight: 1.7, margin: "0 0 16px" }}>
              100% funds open-source development. 501(c)(3) in formation.
              Crypto donations treated as property — donate appreciated assets to avoid capital gains.
            </p>

            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              {["ETH", "USDC", "BTC", "MATIC", "BASE"].map(c => (
                <Btn key={c} small variant={currency === c ? "calcium" : "default"} onClick={() => setCurrency(c)}>{c}</Btn>
              ))}
            </div>

            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              <input
                value={amount}
                onChange={e => setAmount(e.target.value)}
                placeholder={`Amount in ${currency}...`}
                type="number" step="0.001" min="0"
                style={{
                  flex: 1, padding: "10px 14px", fontSize: 14, fontFamily: C.mono,
                  background: C.bg, border: `1px solid ${C.border}`, borderRadius: 6,
                  color: C.text, outline: "none",
                }}
              />
              <Btn variant="love" onClick={simulateDonation}>DONATE 💎</Btn>
            </div>

            <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
              {[0.01, 0.05, 0.1, 0.5, 1.0].map(v => (
                <Btn key={v} small variant="default" onClick={() => setAmount(String(v))}>
                  {v} {currency}
                </Btn>
              ))}
            </div>
          </Card>

          {/* Direct wallet address */}
          <Card glow color={C.green} style={{ animation: "fadeIn 0.5s ease 0.1s both" }}>
            <div style={{ fontSize: 10, fontFamily: C.mono, color: C.green, letterSpacing: "0.12em", marginBottom: 10 }}>
              DIRECT WALLET — BASE L2
            </div>
            <div style={{
              padding: "14px 16px", background: C.bg, borderRadius: 8,
              border: `1px solid ${C.green}25`, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12,
            }}>
              <div style={{
                fontSize: 13, fontFamily: C.mono, color: C.green, wordBreak: "break-all",
                lineHeight: 1.6, letterSpacing: "0.02em", flex: 1,
              }}>
                {WALLET_ADDRESS}
              </div>
              <button onClick={copyAddress} style={{
                background: copied ? C.greenDeep : "transparent",
                border: `1px solid ${copied ? C.green : C.border}`,
                color: copied ? C.green : C.dim, padding: "8px 14px", borderRadius: 6,
                cursor: "pointer", fontFamily: C.mono, fontSize: 11, whiteSpace: "nowrap",
                transition: "all 0.2s",
              }}>
                {copied ? "✓ COPIED" : "📋 COPY"}
              </button>
            </div>
            <div style={{ display: "flex", gap: 16, marginTop: 12 }}>
              {NETWORKS.map(n => (
                <div key={n.id} style={{
                  display: "flex", alignItems: "center", gap: 4,
                  fontSize: 10, color: n.id === "base" ? n.color : C.muted,
                  fontFamily: C.mono,
                }}>
                  <span>{n.icon}</span> {n.name}
                  {n.id === "base" && <Badge color={C.green}>PRIMARY</Badge>}
                </div>
              ))}
            </div>
            <div style={{ fontSize: 10, color: C.muted, marginTop: 10, lineHeight: 1.6 }}>
              Send ETH, USDC, or any ERC-20 token to this address on Base L2 (preferred) or Ethereum mainnet.
              All donations go directly to P31 Labs assistive technology development.
            </div>
          </Card>

          {/* Donation channels */}
          <Card style={{ animation: "fadeIn 0.5s ease 0.2s both" }}>
            <div style={{ fontSize: 10, fontFamily: C.mono, color: C.dim, letterSpacing: "0.12em", marginBottom: 12 }}>
              OTHER WAYS TO GIVE
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
              <div style={{ textAlign: "center", padding: 14, background: C.bg, borderRadius: 8, border: `1px solid ${C.border}` }}>
                <div style={{ fontSize: 24, marginBottom: 6 }}>🏦</div>
                <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 4 }}>Engiven</div>
                <div style={{ fontSize: 9, color: C.dim }}>95+ cryptos</div>
                <div style={{ fontSize: 9, color: C.muted }}>4% processing</div>
              </div>
              <div style={{ textAlign: "center", padding: 14, background: C.bg, borderRadius: 8, border: `1px solid ${C.border}` }}>
                <div style={{ fontSize: 24, marginBottom: 6 }}>💳</div>
                <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 4 }}>Every.org</div>
                <div style={{ fontSize: 9, color: C.dim }}>Card + crypto</div>
                <div style={{ fontSize: 9, color: C.muted }}>Tax receipt included</div>
              </div>
              <div style={{ textAlign: "center", padding: 14, background: C.bg, borderRadius: 8, border: `1px solid ${C.border}` }}>
                <div style={{ fontSize: 24, marginBottom: 6 }}>⚡</div>
                <div style={{ fontSize: 11, fontWeight: 600, marginBottom: 4 }}>Direct Wallet</div>
                <div style={{ fontSize: 9, color: C.dim }}>0% fees</div>
                <div style={{ fontSize: 9, color: C.green }}>Instant</div>
              </div>
            </div>
          </Card>

          {/* Donation history */}
          {state.donations.length > 0 && (
            <Card>
              <div style={{ fontSize: 10, fontFamily: C.mono, color: C.dim, letterSpacing: "0.1em", marginBottom: 8 }}>
                DONATION HISTORY
              </div>
              {state.donations.slice(0, 15).map(d => (
                <div key={d.id} style={{
                  display: "flex", justifyContent: "space-between", padding: "6px 0",
                  borderBottom: `1px solid ${C.border}`,
                }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 16 }}>💎</span>
                    <span style={{ fontSize: 12, fontFamily: C.mono, color: C.text }}>{d.amount} {d.currency}</span>
                  </div>
