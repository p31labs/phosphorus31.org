<script>
  function tick() {
    var now = new Date();
    var h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
    document.getElementById("clock").textContent =
      (h < 10 ? "0" : "") + h + ":" + (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
  }
  setInterval(tick, 1000);
  tick();

  function refresh() {
    google.script.run.withSuccessHandler(render).withFailureHandler(function (e) {
      console.error("Scope fetch failed:", e);
    }).scope();
  }

  function render(d) {
    if (!d) return;

    var sp = d.spoons;
    document.getElementById("spoons").textContent = sp.current;
    document.getElementById("spoonSub").textContent = "of " + sp.max;
    var fill = document.getElementById("spoonFill");
    fill.style.width = sp.pct + "%";
    fill.className = "fill fill-" + (sp.color === "GREEN" ? "green" : sp.color === "YELLOW" ? "yellow" : "red");

    var sig = d.signal;
    document.getElementById("level").textContent = sig.level;
    document.getElementById("xpSub").textContent = sig.xp + " XP";
    document.getElementById("xpFill").style.width = sig.xpPct + "%";

    document.getElementById("love").textContent = d.love.total;
    document.getElementById("blocked").textContent = d.love.blocked;

    var mesh = d.mesh;
    var grid = document.getElementById("meshGrid");
    grid.innerHTML = "";
    var names = Object.keys(mesh.vertices);
    for (var i = 0; i < names.length; i++) {
      var name = names[i];
      var v = mesh.vertices[name];
      var dotClass = v.status === "UP" ? "dot-up" : v.status === "SEPARATED" ? "dot-separated" : "dot-down";
      var el = document.createElement("div");
      el.className = "vertex";
      el.innerHTML = '<div class="dot ' + dotClass + '"></div>' +
        '<span style="color:var(--text)">' + name.charAt(0).toUpperCase() + name.slice(1) + '</span>' +
        '<span style="color:var(--dim);margin-left:auto;font-size:10px">' + v.note + '</span>';
      grid.appendChild(el);
    }
    var stab = document.getElementById("meshStability");
    stab.innerHTML = '<div class="stability stability-' + mesh.stability + '">' +
      mesh.stability + ' · ' + mesh.capacity + '</div>';

    var medList = document.getElementById("medList");
    medList.innerHTML = "";
    if (d.meds) {
      for (var j = 0; j < d.meds.length; j++) {
        var med = d.meds[j];
        var row = document.createElement("div");
        row.className = "med-row";
        row.innerHTML = '<span>' + med.name + '</span>' +
          '<span class="' + (med.overdue ? "med-due" : "med-ok") + '">' +
          (med.overdue ? "DUE" : med.lastTaken) + '</span>';
        medList.appendChild(row);
      }
    }

    var sproutPanel = document.getElementById("sproutPanel");
    if (d.sprout) {
      var cls = d.sprout.last === "help" ? " help" : "";
      sproutPanel.innerHTML =
        '<div class="sprout-card' + cls + '">' +
          '<div style="font-size:16px;color:var(--cyan)">' + d.sprout.last + '</div>' +
          '<div class="sub">' + d.sprout.count24h + ' signals/24h' +
          (d.sprout.helpCount > 0 ? ' · <span style="color:var(--magenta)">' + d.sprout.helpCount + ' help</span>' : '') +
          '</div>' +
        '</div>';
    } else {
      sproutPanel.innerHTML = '<div class="sub">No recent signals</div>';
    }

    var logEl = document.getElementById("recentLog");
    logEl.innerHTML = "";
    if (d.recent) {
      for (var k = 0; k < d.recent.length; k++) {
        var entry = d.recent[k];
        var row2 = document.createElement("div");
        row2.className = "log-entry";
        var time = new Date(entry.t);
        var timeStr = (time.getHours() < 10 ? "0" : "") + time.getHours() + ":" +
          (time.getMinutes() < 10 ? "0" : "") + time.getMinutes();
        row2.innerHTML = '<span class="log-time">' + timeStr + '</span> ' + entry.m;
        logEl.appendChild(row2);
      }
    }
  }

  function submitChaos() {
    var input = document.getElementById("chaosInput");
    var text = input.value.trim();
    if (!text) return;
    input.value = "";
    var out = document.getElementById("terminalOutput");
    out.textContent = "ingesting...";
    google.script.run.withSuccessHandler(function (r) {
      out.textContent = r && r.status === "ingested"
        ? "+" + r.xp + " XP · " + r.spoons + " spoons left"
        : "empty";
      setTimeout(refresh, 500);
    }).ingest(text);
  }

  refresh();
  setInterval(refresh, 60000);
</script>
