<style>
  @import url('https://fonts.googleapis.com/css2?family=Oxanium:wght@200;300;400;600&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --green:   #00FF88;
    --cyan:    #00D4FF;
    --magenta: #FF00CC;
    --violet:  #7A27FF;
    --amber:   #FFB800;
    --void:    #050510;
    --surface1:#0A0A1F;
    --surface2:#12122E;
    --surface3:#1A1A3E;
    --text:    #E0E0EE;
    --muted:   #7878AA;
    --dim:     #4A4A7A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'Oxanium', sans-serif;
    font-weight: 300;
    font-size: 14px;
    line-height: 1.75;
    min-height: 100vh;
    padding: 16px;
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(0,255,136,0.15);
    margin-bottom: 16px;
  }
  .header h1 {
    color: var(--green);
    font-size: 20px;
    font-weight: 200;
    letter-spacing: 4px;
    text-shadow: 0 0 8px rgba(0,255,136,0.4), 0 0 20px rgba(0,255,136,0.2);
  }
  .header .meta {
    color: var(--dim);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }

  .card {
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 6px;
    padding: 16px;
  }
  .card .label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  .card .value {
    font-size: 28px;
    font-weight: 200;
    color: var(--green);
    line-height: 1;
    text-shadow: 0 0 8px rgba(0,255,136,0.3);
  }
  .card .sub {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .gauge {
    width: 100%;
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }
  .gauge .fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease, background 0.6s ease;
    box-shadow: 0 0 6px currentColor;
  }
  .fill-green  { background: var(--green); color: var(--green); }
  .fill-yellow { background: var(--amber); color: var(--amber); }
  .fill-red    { background: var(--magenta); color: var(--magenta); }

  .wide { grid-column: span 2; }
  .full { grid-column: span 4; }

  .mesh-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .vertex {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 6px;
    background: rgba(0,255,136,0.03);
    border: 1px solid rgba(255,255,255,0.04);
    font-size: 11px;
  }
  .vertex .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-up        { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .dot-separated { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .dot-down      { background: var(--magenta); box-shadow: 0 0 8px var(--magenta); }

  .med-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
  }
  .med-row:last-child { border: none; }
  .med-ok  { color: var(--green); text-shadow: 0 0 6px rgba(0,255,136,0.3); }
  .med-due { color: var(--magenta); text-shadow: 0 0 6px rgba(255,0,204,0.3); }

  .log-entry {
    padding: 3px 0;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    border-bottom: 1px solid rgba(255,255,255,0.02);
  }
  .log-entry:last-child { border: none; }
  .log-time { color: var(--dim); font-size: 10px; }

  .terminal {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .terminal input {
    flex: 1;
    background: var(--surface1);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--green);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 4px;
    outline: none;
    letter-spacing: 1px;
  }
  .terminal input:focus {
    border-color: var(--green);
    box-shadow: 0 0 8px rgba(0,255,136,0.15);
  }
  .terminal input::placeholder { color: var(--dim); }
  .terminal button {
    background: transparent;
    border: 1px solid rgba(0,255,136,0.3);
    color: var(--green);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .terminal button:hover {
    background: rgba(0,255,136,0.08);
    box-shadow: 0 0 12px rgba(0,255,136,0.15);
  }

  .sprout-card {
    background: var(--surface1);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 6px;
    padding: 12px;
    margin-top: 8px;
  }
  .sprout-card.help {
    border-color: rgba(255,0,204,0.4);
    box-shadow: 0 0 12px rgba(255,0,204,0.1);
  }

  .stability {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 4px 10px;
    border-radius: 4px;
    display: inline-block;
    margin-top: 8px;
  }
  .stability-RIGID    { color: var(--green); border: 1px solid rgba(0,255,136,0.3); text-shadow: 0 0 6px rgba(0,255,136,0.3); }
  .stability-DEGRADED { color: var(--amber); border: 1px solid rgba(255,184,0,0.3); }
  .stability-CRITICAL { color: var(--magenta); border: 1px solid rgba(255,0,204,0.3); }

  .footer {
    text-align: center;
    color: var(--dim);
    font-size: 9px;
    font-style: italic;
    margin-top: 20px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.04);
    letter-spacing: 1px;
  }

  @media (max-width: 768px) {
    .grid { grid-template-columns: 1fr 1fr; }
    .wide { grid-column: span 2; }
  }
  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    .wide { grid-column: span 1; }
  }
</style>
