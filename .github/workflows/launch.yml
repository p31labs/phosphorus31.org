# P31 Launch — Deploy to production after CI passes
# Trigger: push to main (after CI) or workflow_dispatch.
name: P31 Launch

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: launch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-gate:
    uses: ./.github/workflows/ci.yml

  # ═══ LAUNCH WEBSITE TO CLOUDFLARE PAGES ═══
  launch-website:
    name: Launch phosphorus31.org
    runs-on: ubuntu-latest
    needs: ci-gate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build:web
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ee05f70c889cb6f876b9925257e3a2fa
          command: pages deploy apps/web --project-name=phosphorus31-org

  # ═══ LAUNCH SHELTER BACKEND (placeholders — enable when hosting configured) ═══
  launch-shelter:
    name: Launch Shelter Backend
    runs-on: ubuntu-latest
    needs: ci-gate
    if: github.ref == 'refs/heads/main' && false
    steps:
      - uses: actions/checkout@v4
      # Option A: Railway — set if: false to true and add RAILWAY_TOKEN
      # - uses: bervProject/railway-deploy@main
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: p31-shelter
      # Option B: Fly.io — add flyctl-actions step
      # Option C: Self-hosted SSH
      - run: echo "Shelter launch disabled. Configure Railway/Fly/SSH and set if condition to true."
