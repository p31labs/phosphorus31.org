# P31 Labs — Dual-Domain Launch Pipeline
# phosphorus31.org (static) + p31ca.org (Vite app)
#
# Triggers on push to main or manual dispatch.
# Website deploys immediately (static HTML, no build needed).
# App deploys after CI gate (requires build step).
# Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets.
name: P31 Launch

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: launch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-gate:
    uses: ./.github/workflows/ci.yml

  # ═══ LAUNCH: phosphorus31.org (static site) ═══
  # No CI dependency — static HTML doesn't need monorepo build to pass.
  launch-website:
    name: Launch phosphorus31.org
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Verify website files exist
        run: |
          test -f website/index.html || (echo "FAIL: no index.html" && exit 1)
          test -f website/mesh.html || echo "WARN: no mesh.html (Living Mesh not yet built)"
          echo "Website verification passed"

      - name: Launch phosphorus31.org
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/ --project-name=phosphorus31-org

  # ═══ LAUNCH: p31ca.org (Vite app) ═══
  launch-app:
    name: Launch p31ca.org
    runs-on: ubuntu-latest
    needs: ci-gate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build Vite app
        working-directory: ui
        run: pnpm build

      - name: Verify build output
        run: |
          test -f ui/dist/index.html || (echo "FAIL: no index.html" && exit 1)
          echo "Build verification passed"

      - name: Launch p31ca.org
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ui/dist/ --project-name=p31ca-org

  # ═══ LAUNCH: Shelter Backend (placeholder) ═══
  launch-shelter:
    name: Launch Shelter Backend
    runs-on: ubuntu-latest
    needs: ci-gate
    if: github.ref == 'refs/heads/main' && false
    steps:
      - uses: actions/checkout@v4
      - run: echo "Shelter launch disabled. Configure hosting and set if condition to true."
