# P31 Labs — Dual-Domain Launch Pipeline
# phosphorus31.org (static) + p31ca.org (Vite app)
#
# Triggers on push to main (after CI gate) or manual dispatch.
# Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets.
name: P31 Launch

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: launch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-gate:
    uses: ./.github/workflows/ci.yml

  # ═══ LAUNCH: phosphorus31.org (static site) ═══
  launch-website:
    name: Launch phosphorus31.org
    runs-on: ubuntu-latest
    needs: ci-gate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Verify website/index.html exists
        run: test -f website/index.html

      - name: Deploy phosphorus31.org
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy website/ --project-name=phosphorus31-org

  # ═══ LAUNCH: p31ca.org (Vite app) ═══
  launch-app:
    name: Launch p31ca.org
    runs-on: ubuntu-latest
    needs: ci-gate
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Build Vite app
        working-directory: ui
        run: npm run build

      - name: Verify build output
        run: |
          test -f ui/dist/index.html || (echo "FAIL: no index.html" && exit 1)
          test -f ui/dist/apps/content-forge.html || echo "WARN: content-forge.html missing"
          echo "Build verification passed"

      - name: Deploy p31ca.org
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ui/dist/ --project-name=p31ca-org

  # ═══ LAUNCH: Shelter Backend (placeholder — enable when hosting ready) ═══
  launch-shelter:
    name: Launch Shelter Backend
    runs-on: ubuntu-latest
    needs: ci-gate
    if: github.ref == 'refs/heads/main' && false
    steps:
      - uses: actions/checkout@v4
      - run: echo "Shelter launch disabled. Configure Railway/Fly/SSH and set if condition to true."
