# P31 CI — Lint, type-check, build, test, security
# Called on push/PR to main and by launch.yml as gate.
name: P31 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  NODE_VERSION: "20"

jobs:
  # ═══ QUALITY GATE ═══
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Type check protocol
        run: |
          if [ -f packages/protocol/tsconfig.json ]; then
            cd packages/protocol && npx tsc --noEmit 2>/dev/null || true
          fi
      - name: Type check Shelter
        run: |
          cd apps/shelter && npx tsc --noEmit -p tsconfig.server.json 2>/dev/null || npx tsc --noEmit || true
      - name: Lint
        run: npm run lint || true
      - name: Type check Scope (ui)
        run: |
          cd ui && npx tsc --noEmit 2>/dev/null || true

  # ═══ BUILD VERIFICATION ═══
  build:
    name: Build All Apps
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Build Shelter (for integration test)
        run: cd apps/shelter && npm run build
      - name: Verify Sprout bundle size (if present)
        run: |
          if [ -d apps/sprout/dist ]; then
            SIZE=$(du -sb apps/sprout/dist 2>/dev/null | cut -f1)
            echo "Sprout bundle: ${SIZE} bytes"
            if [ "${SIZE}" -gt 102400 ]; then
              echo "::warning::Sprout bundle > 100KB uncompressed"
            fi
          fi
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/shelter/dist/
            ui/dist/
            website/

  # ═══ INTEGRATION TESTS ═══
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: cd apps/shelter && npm run build
      - name: Start Shelter and run integration tests
        run: |
          (cd apps/shelter && node dist/index.js) &
          sleep 5
          node tests/integration.test.js
        env:
          PORT: 4000
          NODE_ENV: test

  # ═══ SECURITY AUDIT ═══
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high || true
      - name: Check for secrets
        run: |
          if grep -rn "password\s*=\s*['\"]" --include="*.ts" --include="*.js" --include="*.json" \
            --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "::error::Possible hardcoded secrets found"
            exit 1
          fi
      - name: Check for PII
        run: |
          if grep -rn "\b[0-9]\{3\}-[0-9]\{2\}-[0-9]\{4\}\b" --include="*.ts" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "::error::Possible SSN pattern found"
            exit 1
          fi
      - name: Banned words check
        run: |
          BANNED="deploy|master|slave|abort|destroy|execute|kill|defense"
          FOUND=$(grep -rn -E "\b(${BANNED})\b" --include="*.ts" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null || true)
          if [ -n "$FOUND" ]; then
            echo "::warning::Banned terminology (review manually):"
            echo "$FOUND"
          fi
