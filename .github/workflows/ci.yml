# P31 CI — Lint, type-check, build, test, security
# Called on push/PR to main and by launch.yml as gate.
name: P31 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  NODE_VERSION: "20"

jobs:
  # ═══ QUALITY GATE ═══
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Type check buffer-core
        run: pnpm --filter @p31labs/buffer-core typecheck
      - name: Type check Shelter
        run: |
          cd apps/shelter && npx tsc --noEmit -p tsconfig.server.json 2>/dev/null || npx tsc --noEmit || true
      - name: Lint
        run: pnpm lint || true
      - name: Type check Scope (ui)
        run: |
          cd ui && npx tsc --noEmit 2>/dev/null || true

  # ═══ BUILD VERIFICATION ═══
  build:
    name: Build All Apps
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/shelter/dist/
            packages/buffer-core/dist/
            ui/dist/
            website/

  # ═══ TESTS ═══
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run buffer-core tests
        run: pnpm --filter @p31labs/buffer-core test
      - name: Run shelter tests
        run: pnpm --filter @p31labs/shelter test || true

  # ═══ SECURITY AUDIT ═══
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --audit-level=high || true
      - name: Check for secrets
        run: |
          if grep -rn "password\s*=\s*['\"]" --include="*.ts" --include="*.js" --include="*.json" \
            --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "::error::Possible hardcoded secrets found"
            exit 1
          fi
      - name: Check for PII
        run: |
          if grep -rn "\b[0-9]\{3\}-[0-9]\{2\}-[0-9]\{4\}\b" --include="*.ts" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "::error::Possible SSN pattern found"
            exit 1
          fi
