# P31 CI — Lint, type-check, build, test, security
# Called on push/PR to main and by launch.yml as gate.
name: P31 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

env:
  NODE_VERSION: "20"

jobs:
  # ═══ QUALITY GATE ═══
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Type check buffer-core
        run: pnpm --filter @p31labs/buffer-core typecheck
      - name: Type check Shelter
        run: |
          cd apps/shelter && npx tsc --noEmit -p tsconfig.server.json 2>/dev/null || npx tsc --noEmit || true
      - name: Lint
        run: pnpm lint || true
      - name: Type check Scope (ui)
        run: |
          cd ui && npx tsc --noEmit 2>/dev/null || true

  # ═══ BUILD VERIFICATION ═══
  build:
    name: Build All Apps
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            apps/shelter/dist/
            packages/buffer-core/dist/
            ui/dist/
            website/

  # ═══ TESTS ═══
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Run buffer-core tests
        run: pnpm --filter @p31labs/buffer-core test
      - name: Run shelter tests
        run: pnpm --filter @p31labs/shelter test || true

  # ═══ SECURITY AUDIT ═══
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit
        run: pnpm audit --audit-level=high || true
      - name: Check for secrets
        run: |
          if grep -rn "password\s*=\s*['\"]" --include="*.ts" --include="*.js" --include="*.json" \
            --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "::error::Possible hardcoded secrets found"
            exit 1
          fi
      - name: Check for PII
        run: |
          if grep -rn "\b[0-9]\{3\}-[0-9]\{2\}-[0-9]\{4\}\b" --include="*.ts" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.git . 2>/dev/null; then
            echo "::error::Possible SSN pattern found"
            exit 1
          fi

  # ═══ DEPLOYMENT ═══
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, build, test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      # Deploy UI to Cloudflare Pages
      - name: Deploy UI (Scope)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: p31-spectrum
          directory: ui/dist

      # Deploy PWA to Cloudflare Pages
      - name: Deploy PWA (Mesh)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: p31-mesh
          directory: andromeda/04_SOFTWARE/dist

      # Deploy Workers
      - name: Deploy Workers
        run: |
          npx wrangler deploy --env production
        working-directory: andromeda/04_SOFTWARE
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ═══ RELEASE ═══
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Generate changelog
        run: |
          echo "# Release $(date +%Y-%m-%d)" > changelog.md
          echo "" >> changelog.md
          git log --oneline --since="1 week ago" >> changelog.md
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v$(date +%Y%m%d)
          release_name: Release $(date +%Y-%m-%d)
          body_path: changelog.md
          draft: false
          prerelease: false
