name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - cognitive-shield-complete
  pull_request:
    branches:
      - main
      - cognitive-shield-complete

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: npm run install:all
      - name: Build
        run: npm run build
      - name: Lint
        run: npm run lint || true
      - name: Test
        run: npm run test
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: dist/

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Deploy to production
        run: echo "Deploy step placeholder. Integrate with your deployment provider."
