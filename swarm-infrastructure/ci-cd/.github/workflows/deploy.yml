# Swarm Intelligence CI/CD Pipeline
name: Deploy Swarm Intelligence

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  REGION: us-central1
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Configure Docker
        run: gcloud auth configure-docker

      - name: Build and push Docker images
        run: |
          # Build and push Swarm Orchestrator
          docker build -t gcr.io/$PROJECT_ID/swarm-orchestrator:$IMAGE_TAG -f docker/Dockerfile.swarm-orchestrator .
          docker push gcr.io/$PROJECT_ID/swarm-orchestrator:$IMAGE_TAG

          # Build and push Cognitive Shield
          docker build -t gcr.io/$PROJECT_ID/cognitive-shield:$IMAGE_TAG -f docker/Dockerfile.cognitive-shield .
          docker push gcr.io/$PROJECT_ID/cognitive-shield:$IMAGE_TAG

          # Build and push Project Analyzer
          docker build -t gcr.io/$PROJECT_ID/project-analyzer:$IMAGE_TAG -f docker/Dockerfile.project-analyzer .
          docker push gcr.io/$PROJECT_ID/project-analyzer:$IMAGE_TAG

      - name: Deploy to Cloud Run
        run: |
          # Deploy Swarm Orchestrator
          gcloud run deploy swarm-orchestrator \
            --image gcr.io/$PROJECT_ID/swarm-orchestrator:$IMAGE_TAG \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 10

          # Deploy Cognitive Shield
          gcloud run deploy cognitive-shield \
            --image gcr.io/$PROJECT_ID/cognitive-shield:$IMAGE_TAG \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 20

          # Deploy Project Analyzer
          gcloud run deploy project-analyzer \
            --image gcr.io/$PROJECT_ID/project-analyzer:$IMAGE_TAG \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 50

      - name: Run integration tests
        run: |
          npm install
          npm run test:integration

      - name: Deploy infrastructure with Terraform
        if: github.ref == 'refs/heads/main'
        run: |
          cd terraform
          terraform init
          terraform plan -var="project_id=$PROJECT_ID" -var="image_tag=$IMAGE_TAG"
          terraform apply -auto-approve -var="project_id=$PROJECT_ID" -var="image_tag=$IMAGE_TAG"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful"
          else
            echo "❌ Deployment failed"
            exit 1
          fi