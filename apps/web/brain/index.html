function genDome(cx, cy, r, rings = 5) {
  const ns = [{ x: cx, y: cy - r * 0.05 }];
  for (let ring = 1; ring <= rings; ring++) {
    const ct = ring * 6;
    const rad = (ring / rings) * r;
    for (let i = 0; i < ct; i++) {
      const a = (i / ct) * Math.PI * 2 + ring * 0.3;
      ns.push({ x: cx + Math.cos(a) * rad + (Math.random() - 0.5) * 8, y: cy - Math.sin(a) * rad * 0.55 + (Math.random() - 0.5) * 8 });
    }
  }
  const es = [];
  const t = r * 0.38;
  for (let i = 0; i < ns.length; i++)
    for (let j = i + 1; j < ns.length; j++) {
      const d = Math.sqrt((ns[i].x - ns[j].x) ** 2 + (ns[i].y - ns[j].y) ** 2);
      if (d < t && Math.random() > 0.15) es.push([i, j]);
    }
  return { ns, es };
}

function Tet({ cx, cy, s, color, op = 1, p = 0 }) {
  const sz = s + p * 3;
  const pts = [[cx, cy - sz], [cx - sz * 0.866, cy + sz * 0.5], [cx + sz * 0.866, cy + sz * 0.5], [cx, cy + sz * 0.15]];
  return (
    <g opacity={op}>
      {[[0,1],[1,2],[2,0],[0,3],[1,3],[2,3]].map(([a, b], i) => (
        <line key={i} x1={pts[a][0]} y1={pts[a][1]} x2={pts[b][0]} y2={pts[b][1]} stroke={color} strokeWidth={1.2} opacity={0.5 + p * 0.4} />
      ))}
      {pts.map(([x, y], i) => <circle key={i} cx={x} cy={y} r={2 + p * 1.5} fill={color} opacity={0.7} />)}
    </g>
  );
}

function Posner({ cx, cy, size, p }) {
  const ca = Array.from({ length: 9 }, (_, i) => {
    const a = (i / 9) * Math.PI * 2 - Math.PI / 2;
    const r = i < 3 ? size * 0.3 : i < 6 ? size * 0.6 : size * 0.85;
    return { x: cx + Math.cos(a + (i < 3 ? 0.2 : i < 6 ? 0.5 : 0)) * r, y: cy + Math.sin(a + (i < 3 ? 0.2 : i < 6 ? 0.5 : 0)) * r };
  });
  const po = Array.from({ length: 6 }, (_, i) => {
    const a = (i / 6) * Math.PI * 2 - Math.PI / 2 + 0.3;
    return { x: cx + Math.cos(a) * size * 0.5, y: cy + Math.sin(a) * size * 0.5 };
  });
  return (
    <g>
      {ca.flatMap((c, ci) => po.filter(q => Math.sqrt((c.x - q.x) ** 2 + (c.y - q.y) ** 2) < size * 0.55).map((q, pi) => (
        <line key={`b${ci}${pi}`} x1={c.x} y1={c.y} x2={q.x} y2={q.y} stroke={P} strokeWidth={0.6} opacity={0.12 + p * 0.08} />
      )))}
      {ca.map((c, i) => <g key={`ca${i}`}><circle cx={c.x} cy={c.y} r={3.5 + p * 1.2} fill="none" stroke={W6} strokeWidth={0.7} opacity={0.35 + p * 0.15} /><circle cx={c.x} cy={c.y} r={1.8} fill={W6} opacity={0.5} /></g>)}
      {po.map((q, i) => <g key={`po${i}`}><circle cx={q.x} cy={q.y} r={4.5 + p * 1.8} fill="none" stroke={P} strokeWidth={0.9} opacity={0.25 + p * 0.25} filter="url(#gl)" /><circle cx={q.x} cy={q.y} r={2.2} fill={P} opacity={0.85} /></g>)}
      <text x={cx} y={cy + 1} textAnchor="middle" fill={P} fontSize={5} fontFamily="monospace" opacity={0.35}>{"\u00b3\u00b9P"}</text>
    </g>
  );
}
