global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'phenix-citadel@localhost'
  smtp_auth_username: 'phenix-citadel@localhost'
  smtp_auth_password: 'changeme'

route:
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'web.hook'
  routes:
    - match:
        severity: gis-failure
      receiver: 'sovereignty-gis-webhook'
      repeat_interval: 1m
    - match:
        severity: critical
      receiver: 'critical-alerts'
      repeat_interval: 5m
    - match:
        severity: warning
      receiver: 'warning-alerts'
      repeat_interval: 30m

receivers:
  - name: 'web.hook'
    webhook_configs:
      - url: 'http://localhost:5001/webhook'

  - name: 'sovereignty-gis-webhook'
    webhook_configs:
      - url: 'https://script.google.com/macros/s/AKfycbwoS5o_PXa-PgZdJBC7Bzh5FN2xZCVhQ4HNaFPnqiJuJvqYYhRpqRwKfOEHBNZxrBo/exec?action=sendNotification'
        send_resolved: true

  - name: 'critical-alerts'
    email_configs:
      - to: 'admin@localhost'
        subject: '[CRITICAL] {{ .GroupLabels.alertname }}'
        body: |
          Alert: {{ .GroupLabels.alertname }}
          Severity: {{ .CommonLabels.severity }}
          Description: {{ .CommonAnnotations.description }}
          Time: {{ .GroupLabels.time }}
          
          Details:
          {{ range .Alerts }}
          - {{ .Annotations.summary }}
          {{ end }}
    
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
        channel: '#phenix-citadel-alerts'
        title: 'CRITICAL Alert: {{ .GroupLabels.alertname }}'
        text: |
          *Alert:* {{ .GroupLabels.alertname }}
          *Severity:* {{ .CommonLabels.severity }}
          *Description:* {{ .CommonAnnotations.description }}
          
          {{ range .Alerts }}
          - {{ .Annotations.summary }}
          {{ end }}

  - name: 'warning-alerts'
    email_configs:
      - to: 'admin@localhost'
        subject: '[WARNING] {{ .GroupLabels.alertname }}'
        body: |
          Alert: {{ .GroupLabels.alertname }}
          Severity: {{ .CommonLabels.severity }}
          Description: {{ .CommonAnnotations.description }}
          Time: {{ .GroupLabels.time }}
          
          Details:
          {{ range .Alerts }}
          - {{ .Annotations.summary }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'dev', 'instance']