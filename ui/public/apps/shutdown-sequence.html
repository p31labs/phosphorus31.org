<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shutdown Sequence — P31 Labs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #050510;
      color: #E0E0EE;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      max-width: 600px;
      margin: 0 auto;
      transition: opacity 1s ease-out;
    }

    body.dimmed {
      opacity: 0.1;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 1.75rem;
      color: #f59e0b;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #7878AA;
      font-size: 0.9rem;
    }

    .progress-container {
      margin-bottom: 2rem;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(245, 158, 11, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #f59e0b;
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 4px;
    }

    .progress-text {
      text-align: center;
      margin-top: 0.5rem;
      color: #7878AA;
      font-size: 0.875rem;
    }

    .edit-toggle {
      text-align: right;
      margin-bottom: 1rem;
    }

    .edit-toggle button {
      padding: 0.5rem 1rem;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 6px;
      color: #E0E0EE;
      cursor: pointer;
      font-family: system-ui;
      font-size: 0.875rem;
    }

    .edit-toggle button:hover {
      background: rgba(245, 158, 11, 0.2);
    }

    .checklist {
      list-style: none;
      margin-bottom: 2rem;
    }

    .checklist-item {
      padding: 1rem;
      margin-bottom: 0.75rem;
      background: rgba(120, 120, 170, 0.05);
      border-radius: 8px;
      border-left: 3px solid rgba(245, 158, 11, 0.3);
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .checklist-item:hover {
      background: rgba(120, 120, 170, 0.1);
      border-left-color: rgba(245, 158, 11, 0.6);
    }

    .checklist-item.completed {
      opacity: 0.4;
      text-decoration: line-through;
      border-left-color: rgba(245, 158, 11, 0.2);
    }

    .checklist-item input[type="checkbox"] {
      width: 24px;
      height: 24px;
      cursor: pointer;
      accent-color: #f59e0b;
      flex-shrink: 0;
    }

    .checklist-item label {
      flex: 1;
      cursor: pointer;
      user-select: none;
    }

    .checklist-item input[type="text"] {
      flex: 1;
      padding: 0.5rem;
      background: rgba(120, 120, 170, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 4px;
      color: #E0E0EE;
      font-family: system-ui;
      font-size: 1rem;
    }

    .checklist-item input[type="text"]:focus {
      outline: none;
      border-color: #f59e0b;
    }

    .add-item {
      padding: 1rem;
      background: rgba(245, 158, 11, 0.1);
      border: 2px dashed rgba(245, 158, 11, 0.3);
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      color: #7878AA;
      margin-bottom: 1rem;
      display: none;
    }

    .add-item.visible {
      display: block;
    }

    .add-item:hover {
      border-color: rgba(245, 158, 11, 0.5);
      color: #E0E0EE;
    }

    .goodnight-message {
      text-align: center;
      font-size: 1.5rem;
      color: #f59e0b;
      margin-top: 3rem;
      display: none;
    }

    .goodnight-message.active {
      display: block;
    }

    footer {
      margin-top: auto;
      padding-top: 2rem;
      text-align: center;
      color: #7878AA;
      font-size: 0.875rem;
    }

    .delete-btn {
      padding: 0.25rem 0.5rem;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.3);
      border-radius: 4px;
      color: #f87171;
      cursor: pointer;
      font-size: 0.75rem;
      display: none;
    }

    .delete-btn.visible {
      display: block;
    }

    .delete-btn:hover {
      background: rgba(248, 113, 113, 0.2);
    }
  </style>
</head>
<body>
  <header>
    <h1>🌙 Shutdown Sequence</h1>
    <p class="subtitle">End-of-day wind-down checklist.</p>
  </header>

  <div class="progress-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">0% complete</div>
  </div>

  <div class="edit-toggle">
    <button id="editToggle">Edit</button>
  </div>

  <div class="add-item" id="addItem">+ Add item</div>

  <ul class="checklist" id="checklist"></ul>

  <div class="goodnight-message" id="goodnightMessage">
    Goodnight. The mesh holds. 🔺
  </div>

  <footer>
    P31 Labs — phosphorus31.org — It's okay to be a little wonky. 🔺
  </footer>

  <script>
    const defaultItems = [
      'Close browser tabs',
      'Write tomorrow\'s first task',
      'Set out clothes',
      'Plug in devices',
      'Take meds',
      'Set alarm',
      'One grateful thing',
      'Lights down'
    ];

    const checklist = document.getElementById('checklist');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const editToggle = document.getElementById('editToggle');
    const addItem = document.getElementById('addItem');
    const goodnightMessage = document.getElementById('goodnightMessage');
    const body = document.body;

    let editMode = false;
    let items = [];

    function getTodayKey() {
      return new Date().toDateString();
    }

    function loadItems() {
      const saved = localStorage.getItem('shutdownSequence');
      if (saved) {
        const data = JSON.parse(saved);
        const todayKey = getTodayKey();
        
        if (data.date === todayKey) {
          items = data.items;
        } else {
          items = defaultItems.map(text => ({ text, completed: false }));
        }
      } else {
        items = defaultItems.map(text => ({ text, completed: false }));
      }
      renderChecklist();
      updateProgress();
    }

    function saveItems() {
      localStorage.setItem('shutdownSequence', JSON.stringify({
        date: getTodayKey(),
        items: items
      }));
    }

    function renderChecklist() {
      checklist.innerHTML = '';
      
      items.forEach((item, index) => {
        const li = document.createElement('li');
        li.className = `checklist-item ${item.completed ? 'completed' : ''}`;
        
        if (editMode) {
          const input = document.createElement('input');
          input.type = 'text';
          input.value = item.text;
          input.addEventListener('blur', () => {
            item.text = input.value.trim() || 'New item';
            saveItems();
            renderChecklist();
          });
          input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
              input.blur();
            }
          });
          
          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'delete-btn visible';
          deleteBtn.textContent = '×';
          deleteBtn.onclick = () => {
            items.splice(index, 1);
            saveItems();
            renderChecklist();
            updateProgress();
          };
          
          li.appendChild(input);
          li.appendChild(deleteBtn);
        } else {
          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = item.completed;
          checkbox.onchange = () => {
            item.completed = checkbox.checked;
            saveItems();
            updateProgress();
            renderChecklist();
          };
          
          const label = document.createElement('label');
          label.textContent = item.text;
          label.onclick = (e) => {
            e.preventDefault();
            checkbox.click();
          };
          
          li.appendChild(checkbox);
          li.appendChild(label);
        }
        
        checklist.appendChild(li);
      });
    }

    function updateProgress() {
      const completed = items.filter(item => item.completed).length;
      const total = items.length;
      const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
      
      progressFill.style.width = percent + '%';
      progressText.textContent = `${percent}% complete`;
      
      if (percent === 100) {
        setTimeout(() => {
          body.classList.add('dimmed');
          goodnightMessage.classList.add('active');
        }, 500);
      } else {
        body.classList.remove('dimmed');
        goodnightMessage.classList.remove('active');
      }
    }

    editToggle.addEventListener('click', () => {
      editMode = !editMode;
      editToggle.textContent = editMode ? 'Done' : 'Edit';
      addItem.classList.toggle('visible', editMode);
      renderChecklist();
    });

    addItem.addEventListener('click', () => {
      items.push({ text: 'New item', completed: false });
      saveItems();
      renderChecklist();
      
      setTimeout(() => {
        const inputs = checklist.querySelectorAll('input[type="text"]');
        if (inputs.length > 0) {
          inputs[inputs.length - 1].focus();
          inputs[inputs.length - 1].select();
        }
      }, 10);
    });

    loadItems();
  </script>
</body>
</html>
