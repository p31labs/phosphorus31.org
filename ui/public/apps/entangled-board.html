<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entangled Board · P31 Labs</title>
  <meta name="description" content="Visual thinking space. Cards, groups, connections. Mind map your chaos.">
  <meta name="theme-color" content="#050510">
  <meta name="p31:type" content="app">
  <meta name="p31:name" content="Entangled Board">
  <meta name="p31:category" content="hearth">
  <meta name="p31:version" content="1.0.0">
  <meta name="p31:author" content="P31 Labs">
  <meta name="p31:license" content="Apache-2.0">
  <meta name="p31:tags" content="kanban, board, visual, planning, mindmap">
  <meta name="p31:icon" content="📋">
  <meta name="p31:color" content="#f59e0b">
  <meta name="p31:offline" content="true">
  <meta name="p31:accessibility" content="keyboard, screenreader, reducedmotion">
  <style>
    :root {
      --void: #050510; --void-up: #0a0a1a; --void-surface: #0f0f24;
      --void-border: #1a1a3a; --node-color: #f59e0b; --node-dim: #d97706;
      --node-glow: rgba(245,158,11,0.15); --white: #e8e8f0;
      --white-dim: #9898b0; --white-muted: #585870; --green: #2ecc71;
      --cyan: #00d4ff; --violet: #a78bfa; --magenta: #ff00cc;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
      --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--void); color: var(--white); min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .toolbar {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.5rem 1rem; background: var(--void-up);
      border-bottom: 1px solid var(--void-border);
      flex-wrap: wrap; z-index: 50;
    }
    .brand { font-family: var(--mono); font-weight: 700; color: var(--green); font-size: 0.85rem; }
    .brand sup { font-size: 0.55em; color: #60a5fa; }
    .toolbar-sep { width: 1px; height: 1.5rem; background: var(--void-border); margin: 0 0.25rem; }
    .toolbar select, .toolbar button {
      font-family: var(--mono); font-size: 0.75rem; background: var(--void-surface);
      color: var(--white-dim); border: 1px solid var(--void-border); padding: 0.35rem 0.6rem;
      cursor: pointer; border-radius: 2px;
    }
    .toolbar button:hover { color: var(--white); border-color: var(--node-color); }
    .toolbar button:focus { outline: 2px solid var(--node-color); outline-offset: 1px; }

    .board-area { flex: 1; display: flex; gap: 1rem; padding: 1rem; overflow-x: auto; overflow-y: hidden; }

    .column {
      min-width: 280px; max-width: 320px; flex-shrink: 0;
      background: var(--void-up); border: 1px solid var(--void-border);
      border-radius: 6px; display: flex; flex-direction: column;
      max-height: calc(100vh - 80px);
    }
    .column-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem; border-bottom: 1px solid var(--void-border);
    }
    .column-title {
      font-family: var(--mono); font-size: 0.8rem; font-weight: 600;
      background: transparent; border: none; color: var(--node-color);
      padding: 0.2rem 0.4rem; border-radius: 2px; width: 100%;
    }
    .column-title:focus { outline: none; background: var(--void-surface); border: 1px solid var(--void-border); }
    .column-count { font-family: var(--mono); font-size: 0.65rem; color: var(--white-muted); margin-left: 0.5rem; white-space: nowrap; }
    .column-del {
      background: none; border: none; color: var(--white-muted); cursor: pointer;
      font-size: 0.85rem; padding: 0.2rem; margin-left: 0.25rem;
    }
    .column-del:hover { color: var(--magenta); }

    .cards { flex: 1; overflow-y: auto; padding: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .cards.drag-over { background: var(--node-glow); }

    .card {
      background: var(--void-surface); border: 1px solid var(--void-border);
      border-radius: 4px; padding: 0.75rem; cursor: grab; position: relative;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: var(--node-color); }
    .card.dragging { opacity: 0.5; cursor: grabbing; }
    .card-text {
      font-size: 0.85rem; color: var(--white); line-height: 1.5;
      background: transparent; border: none; width: 100%; resize: none;
      font-family: var(--font); min-height: 1.5em;
    }
    .card-text:focus { outline: none; }
    .card-meta {
      display: flex; align-items: center; gap: 0.5rem; margin-top: 0.5rem;
      font-family: var(--mono); font-size: 0.6rem; color: var(--white-muted);
    }
    .card-color {
      width: 8px; height: 8px; border-radius: 50%; cursor: pointer;
      border: 1px solid var(--void-border);
    }
    .card-del {
      position: absolute; top: 4px; right: 6px; background: none; border: none;
      color: var(--white-muted); cursor: pointer; font-size: 0.75rem; padding: 0.15rem;
    }
    .card-del:hover { color: var(--magenta); }

    .add-card-btn {
      width: 100%; background: transparent; border: 1px dashed var(--void-border);
      color: var(--white-muted); font-family: var(--mono); font-size: 0.7rem;
      padding: 0.5rem; cursor: pointer; border-radius: 3px; margin-top: auto;
    }
    .add-card-btn:hover { border-color: var(--node-color); color: var(--node-color); }

    .add-col-btn {
      min-width: 180px; flex-shrink: 0; background: var(--void-up);
      border: 2px dashed var(--void-border); border-radius: 6px;
      color: var(--white-muted); font-family: var(--mono); font-size: 0.8rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .add-col-btn:hover { border-color: var(--node-color); color: var(--node-color); }

    .status-bar {
      padding: 0.4rem 1rem; background: var(--void-up); border-top: 1px solid var(--void-border);
      font-family: var(--mono); font-size: 0.7rem; color: var(--white-muted);
      display: flex; justify-content: space-between;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div class="toolbar" role="toolbar" aria-label="Board tools">
    <span class="brand">P<sup>31</sup></span>
    <span style="font-family:var(--mono);font-size:0.75rem;color:var(--white-muted)">/ Board</span>
    <div class="toolbar-sep"></div>
    <select id="boardSelect" aria-label="Select board"></select>
    <button onclick="newBoard()">+ Board</button>
    <button onclick="deleteBoard()">Remove</button>
    <div class="toolbar-sep"></div>
    <button onclick="exportBoard()">Export JSON</button>
    <button onclick="downloadSelf()">Get App ↓</button>
  </div>

  <div class="board-area" id="boardArea" role="region" aria-label="Board columns"></div>

  <div class="status-bar">
    <span id="cardCount">0 cards</span>
    <span style="color:var(--green)" id="saveStatus">Saved</span>
  </div>

  <script>
    const KEY = 'entangledBoard';
    const COLORS = ['#2ecc71','#00d4ff','#f59e0b','#a78bfa','#ff00cc','#e8e8f0'];
    let boards = [];
    let currentId = null;
    let dragCard = null;
    let dragColIdx = null;
    let dragCardIdx = null;
    let saveTimer = null;

    function load() {
      const raw = localStorage.getItem(KEY);
      if (raw) { try { boards = JSON.parse(raw); } catch(e) { boards = []; } }
      if (!boards.length) {
        boards.push({
          id: uid(), name: 'My Board',
          columns: [
            { title: 'Inbox', cards: [{ id: uid(), text: 'Your first thought goes here', color: 0, created: new Date().toISOString() }] },
            { title: 'Working', cards: [] },
            { title: 'Done', cards: [] }
          ]
        });
      }
      currentId = boards[0].id;
      rebuildBoardSelect();
      render();
    }

    function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }
    function current() { return boards.find(b => b.id === currentId); }
    function save() { localStorage.setItem(KEY, JSON.stringify(boards)); document.getElementById('saveStatus').textContent = 'Saved'; }
    function scheduleSave() { document.getElementById('saveStatus').textContent = '...'; clearTimeout(saveTimer); saveTimer = setTimeout(save, 500); }

    function rebuildBoardSelect() {
      const sel = document.getElementById('boardSelect');
      sel.innerHTML = '';
      boards.forEach(b => {
        const o = document.createElement('option');
        o.value = b.id; o.textContent = b.name;
        if (b.id === currentId) o.selected = true;
        sel.appendChild(o);
      });
    }

    function render() {
      const board = current();
      if (!board) return;
      const area = document.getElementById('boardArea');
      area.innerHTML = '';
      let totalCards = 0;

      board.columns.forEach((col, ci) => {
        totalCards += col.cards.length;
        const colEl = document.createElement('div');
        colEl.className = 'column';
        colEl.dataset.colIdx = ci;

        // Header
        const header = document.createElement('div');
        header.className = 'column-header';
        const titleInput = document.createElement('input');
        titleInput.type = 'text'; titleInput.className = 'column-title';
        titleInput.value = col.title; titleInput.setAttribute('aria-label', 'Column name');
        titleInput.addEventListener('input', () => { col.title = titleInput.value; scheduleSave(); });
        const count = document.createElement('span');
        count.className = 'column-count'; count.textContent = col.cards.length;
        const delBtn = document.createElement('button');
        delBtn.className = 'column-del'; delBtn.innerHTML = '&times;';
        delBtn.setAttribute('aria-label', 'Remove column');
        delBtn.onclick = () => { if (board.columns.length <= 1) return; board.columns.splice(ci, 1); save(); render(); };
        header.appendChild(titleInput); header.appendChild(count); header.appendChild(delBtn);
        colEl.appendChild(header);

        // Cards area
        const cardsEl = document.createElement('div');
        cardsEl.className = 'cards';
        cardsEl.dataset.colIdx = ci;
        cardsEl.addEventListener('dragover', (e) => { e.preventDefault(); cardsEl.classList.add('drag-over'); });
        cardsEl.addEventListener('dragleave', () => { cardsEl.classList.remove('drag-over'); });
        cardsEl.addEventListener('drop', (e) => {
          e.preventDefault(); cardsEl.classList.remove('drag-over');
          if (dragCard === null) return;
          const srcCol = board.columns[dragColIdx];
          const card = srcCol.cards.splice(dragCardIdx, 1)[0];
          col.cards.push(card);
          save(); render();
        });

        col.cards.forEach((card, cardi) => {
          const cardEl = document.createElement('div');
          cardEl.className = 'card';
          cardEl.draggable = true;
          cardEl.addEventListener('dragstart', () => { dragCard = card; dragColIdx = ci; dragCardIdx = cardi; cardEl.classList.add('dragging'); });
          cardEl.addEventListener('dragend', () => { dragCard = null; cardEl.classList.remove('dragging'); });

          const textArea = document.createElement('textarea');
          textArea.className = 'card-text'; textArea.value = card.text;
          textArea.rows = 1; textArea.setAttribute('aria-label', 'Card text');
          textArea.addEventListener('input', () => {
            card.text = textArea.value; scheduleSave();
            textArea.style.height = 'auto';
            textArea.style.height = textArea.scrollHeight + 'px';
          });
          setTimeout(() => { textArea.style.height = textArea.scrollHeight + 'px'; }, 0);

          const meta = document.createElement('div');
          meta.className = 'card-meta';
          const colorDot = document.createElement('div');
          colorDot.className = 'card-color';
          colorDot.style.background = COLORS[card.color % COLORS.length];
          colorDot.title = 'Change color';
          colorDot.onclick = () => { card.color = (card.color + 1) % COLORS.length; colorDot.style.background = COLORS[card.color]; scheduleSave(); };
          const date = document.createElement('span');
          date.textContent = new Date(card.created).toLocaleDateString();
          meta.appendChild(colorDot); meta.appendChild(date);

          const delBtn2 = document.createElement('button');
          delBtn2.className = 'card-del'; delBtn2.innerHTML = '&times;';
          delBtn2.setAttribute('aria-label', 'Remove card');
          delBtn2.onclick = () => { col.cards.splice(cardi, 1); save(); render(); };

          cardEl.appendChild(textArea); cardEl.appendChild(meta); cardEl.appendChild(delBtn2);
          cardsEl.appendChild(cardEl);
        });

        // Add card button
        const addBtn = document.createElement('button');
        addBtn.className = 'add-card-btn'; addBtn.textContent = '+ Card';
        addBtn.onclick = () => {
          col.cards.push({ id: uid(), text: '', color: 0, created: new Date().toISOString() });
          save(); render();
          const cards = colEl.querySelectorAll('.card-text');
          if (cards.length) cards[cards.length - 1].focus();
        };

        colEl.appendChild(cardsEl);
        colEl.appendChild(addBtn);
        area.appendChild(colEl);
      });

      // Add column button
      const addColBtn = document.createElement('button');
      addColBtn.className = 'add-col-btn'; addColBtn.textContent = '+ Column';
      addColBtn.onclick = () => {
        board.columns.push({ title: 'New Column', cards: [] });
        save(); render();
      };
      area.appendChild(addColBtn);

      document.getElementById('cardCount').textContent = `${totalCards} cards · ${board.columns.length} columns`;
    }

    function newBoard() {
      const b = { id: uid(), name: 'Board ' + (boards.length + 1), columns: [{ title: 'Inbox', cards: [] }, { title: 'Working', cards: [] }, { title: 'Done', cards: [] }] };
      boards.push(b); currentId = b.id; save(); rebuildBoardSelect(); render();
    }

    function deleteBoard() {
      if (boards.length <= 1) return;
      boards = boards.filter(b => b.id !== currentId);
      currentId = boards[0].id; save(); rebuildBoardSelect(); render();
    }

    function exportBoard() {
      const b = current(); if (!b) return;
      const blob = new Blob([JSON.stringify(b, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = (b.name.replace(/\s+/g, '-').toLowerCase() || 'board') + '.json';
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    function downloadSelf() {
      const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'entangled-board.html';
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    document.getElementById('boardSelect').addEventListener('change', (e) => { save(); currentId = e.target.value; rebuildBoardSelect(); render(); });

    load();
  </script>
</body>
</html>
